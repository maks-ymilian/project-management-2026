<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booking History</title>

    <link rel="stylesheet" href="../css/style.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
        }

        .booking-card {
            background: white;
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .car-name {
            font-size: 18px;
            font-weight: bold;
        }

        .price {
            color: green;
            font-weight: bold;
        }

        .status {
            margin-top: 5px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Booking History</h1>

        <div id="booking-container">
            <!-- bookings will load here -->
        </div>
    </div>

    <script type="module" src="/js/booking-history.js"></script>
</body>
</html>
